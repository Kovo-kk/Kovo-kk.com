<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单项标签示例</title>
</head>
<body>
    <!-- 必须使用 form 标签包裹所有表单项和按钮 -->
    <!-- action: 指定提交地址, method: 指定提交方式(get/post) -->
    <form action="#" method="post">
        
        姓名：<input type="text" name="name"><br><br>

        密码：<input type="password" name="password"><br><br>

        性别：<input type="radio" name="sex" value="男">男
        <label><input type="radio" name="sex" value="女">女</label><br><br>

        爱好：<label><input type="checkbox" name="hobby" value="CF">CF</label>
        <label><input type="checkbox" name="hobby" value="瓦罗兰特">瓦罗兰特</label>
        <label><input type="checkbox" name="hobby" value="csgo">csgo</label><br><br>

        图像：<input type="file" name="image"><br><br>

        生日：<input type="date" name="birthday"><br><br>

        时间：<input type="time" name="time"><br><br>
        
        日期时间：<input type="datetime-local" name="datetime"><br><br>

        学历：<select name="degree"> 
            <option value="">请选择</option>
            <option value="本科">本科</option>
            <option value="大专">大专</option>
            <option value="高中">高中</option>
            <option value="初中">初中</option>
            <option value="小学">小学</option>
            <option value="其他">其他</option>
        </select><br><br>
        
        描述：<textarea name="desc" cols="30" rows="10"></textarea><br><br>
        
        <!-- 隐藏域 -->
        <input type="hidden" name="id" value="1">

        <hr>

        <!-- 表单常见按钮 -->
        <!-- 普通按钮，通常配合JS使用 -->
        <input type="button" value="普通按钮">
        
        <!-- 重置按钮：点击后会将form内的所有输入框恢复到默认值 -->
        <input type="reset" value="重置">
        
        <!-- 提交按钮：点击后会触发form的提交动作 -->
        <input type="submit" value="提交">
        
    </form>
</body>
</html>
